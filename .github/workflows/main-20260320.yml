name: Build and Release AmiiboGenerator - 20260320

on:
  workflow_dispatch:
    
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-tags: true
        path: AmiiboGenerator
        submodules: recursive

    - name: Extract version + short hash
      id: version
      run: |
        VERSION=$(grep 'APP_VERSION := ' AmiiboGenerator/Makefile | awk -F' := ' '{print $2}' | tr -d '[:space:]')
        SHORT_HASH=$(git -C AmiiboGenerator rev-parse --short=7 HEAD)
        echo "TAG_NAME=v${VERSION}-${SHORT_HASH}" >> $GITHUB_ENV
        echo "RELEASE_NAME=AmiiboGenerator v${VERSION} (${SHORT_HASH})" >> $GITHUB_ENV
      shell: bash

    - name: Build
      run: |
        git config --global --add safe.directory "AmiiboGenerator" && \
        make -C AmiiboGenerator -j$(nproc)
      shell: bash

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: ${{ env.TAG_NAME }}
        name: ${{ env.RELEASE_NAME }}
        body: "Automated release for AmiiboGenerator ${{ env.TAG_NAME }}"
        files: AmiiboGenerator/AmiiboGenerator.nro
        draft: false
        prerelease: false
        generate_release_notes: true
